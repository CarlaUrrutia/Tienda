server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: cliente
          uri: http://localhost:8082
          predicates:
        - Path=/api/clientes,/api/clientes/**

        - id: empleado
          uri: http://localhost:8081
          predicates:
            - Path=/api/empleados/**

        - id: venta
          uri: http://localhost:8086
          predicates:
            - Path=/api/ventas/**

        - id: producto
          uri: http://localhost:8083
          predicates:
            - Path=/api/productos/**

        - id: proveedor
          uri: http://localhost:8084
          predicates:
            - Path=/api/proveedores/**

        - id: tienda
          uri: http://localhost:8085
          predicates:
            - Path=/api/tiendas/**

        - id: detalleVenta
          uri: http://localhost:8087
          predicates:
            - Path=/api/detalles/**

        - id: boleta
          uri: http://localhost:8088
          predicates:
            - Path=/api/boletas/**

        - id: factura
          uri: http://localhost:8089
          predicates:
            - Path=/api/facturas/**

        - id: cupon
          uri: http://localhost:8090
          predicates:
            - Path=/api/cupones/**

        - id: tarjeta
          uri: http://localhost:8091
          predicates:
            - Path=/api/tarjetas/**

        - id: oferta
          uri: http://localhost:8092
          predicates:
            - Path=/api/ofertas/**

        - id: inventario
          uri: http://localhost:8093
          predicates:
            - Path=/api/inventarios/**

        - id: envio
          uri: http://localhost:8094
          predicates:
            - Path=/api/envios/**

        - id: devolucion
          uri: http://localhost:8095
          predicates:
            - Path=/api/devoluciones/**

        - id: rol
          uri: http://localhost:8096
          predicates:
            - Path=/api/roles/**