spring.application.name=devolucion
server.port=8095

spring.datasource.url=jdbc:mysql://localhost:3306/patata
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

ms.venta.url=http://localhost:8086
ms.cliente.url=http://localhost:8082
ms.empleado.url=http://localhost:8081
ms.tarjeta.url=http://localhost:8091
ms.producto.url=http://localhost:8083

spring.liquibase.change-log=classpath:/db/changelog/changelog-master.xml
spring.liquibase.default-schema=patata
spring.liquibase.enabled=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
