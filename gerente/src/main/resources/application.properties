spring.application.name=gerente


#robo copiado de project profe


# Puerto del microservicio Persona
server.port=8080

# Misma base de datos que ms-genero
# Ambos microservicios comparten las tablas pero cada uno expone su propio servicio/API
spring.datasource.url=jdbc:mysql://localhost:3306/db_persona
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Basic Auth
spring.security.user.name=admin
spring.security.user.password=admin123

# =============================================
# WEBCLIENT - URL del microservicio Genero
# =============================================
# Esta URL apunta al ms-genero corriendo en puerto 8081 (usada por WebClient)
ms.genero.url=http://localhost:8081

# Credenciales que usa WebClient para autenticarse en ms-genero
ms.genero.user=admin
ms.genero.password=admin123

# Logs propios
logging.file.name=logs/ms-persona.log
logging.level.root=INFO
logging.level.com.ejemplo.persona=DEBUG
logging.level.org.springframework.web.reactive=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
